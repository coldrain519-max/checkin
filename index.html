  t.push(b(hist,'history','hist'));t.push(b(poli,'politics','poli'));
  t.push(b(['\u8BED\u6587\uFF1A\u516B\u4E0A\u53E4\u8BD7\u6587\u603B\u590D\u4E60+\u9ED8\u5199\u9A8C\u6536\uFF08\u4E09\u5CE1/\u7B54\u8C22\u4E2D\u4E66\u4E66/\u8BB0\u627F\u5929\u5BFA\u591C\u6E38\uFF09','\u8BED\u6587\uFF1A\u516B\u4E0A\u53E4\u8BD7\u6587\u603B\u590D\u4E60+\u9ED8\u5199\u9A8C\u6536\uFF08\u4E0E\u6731\u5143\u601D\u4E66/\u5510\u8BD7\u4E94\u9996\u524D3\u9996\uFF09','\u8BED\u6587\uFF1A\u516B\u4E0A\u53E4\u8BD7\u6587\u603B\u590D\u4E60+\u9ED8\u5199\u9A8C\u6536\uFF08\u5510\u8BD7\u4E94\u9996\u540E2\u9996+\u5168\u90E8\u9ED8\u5199\uFF09','\u8BED\u6587\uFF1A\u51991\u7BC7\u4F5C\u6587\uFF08600\u5B57\uFF0C\u6691\u671F\u603B\u7ED3/\u65B0\u5B66\u671F\u8BA1\u5212\uFF09','\u8BED\u6587\uFF1A\u540D\u8457\u8BFB\u540E\u9A8C\u6536\u2014\u2014\u5199\u300A\u7EA2\u661F\u7167\u8000\u4E2D\u56FD\u300B\u8BFB\u540E\u611F300\u5B57','\u8BED\u6587\uFF1A\u540D\u8457\u8BFB\u540E\u9A8C\u6536\u2014\u2014\u5199\u300A\u7EA2\u5CA9\u300B\u8BFB\u540E\u611F300\u5B57','\u8BED\u6587\uFF1A\u73B0\u4EE3\u6587\u9605\u8BFB2\u7BC7\uFF08\u6982\u62EC+\u8D4F\u6790+\u4E3B\u65E8\u5F52\u7EB3\uFF09','\u8BED\u6587\uFF1A\u73B0\u4EE3\u6587\u9605\u8BFB2\u7BC7+\u6587\u8A00\u6587\u9605\u8BFB1\u7BC7','\u8BED\u6587\uFF1A\u4FEE\u6539\u4E4B\u524D\u5199\u7684\u4F5C\u6587\uFF08\u6DA6\u8272\u8BED\u8A00+\u8C03\u6574\u7ED3\u6784\uFF09','\u8BED\u6587\uFF1A\u516B\u4E0A\u53E4\u8BD7\u6587\u6700\u7EC8\u80CC\u8BF5\u9A8C\u6536\uFF08\u5BB6\u957F\u62BD\u67E55\u9996\u9ED8\u5199\uFF09','\u8BED\u6587\uFF1A\u73B0\u4EE3\u6587\u9605\u8BFB2\u7BC7+\u57FA\u7840\u77E5\u8BC6\u590D\u4E60\uFF08\u5B57\u8BCD+\u6210\u8BED\uFF09','\u8BED\u6587\uFF1A\u7EFC\u5408\u590D\u4E60+\u6574\u7406\u6691\u671F\u8BED\u6587\u7B14\u8BB0','\u8BED\u6587\uFF1A\u5F00\u5B66\u524D\u8BED\u57FA\u81EA\u6D4B\uFF08\u5B57\u97F3/\u5B57\u5F62/\u6210\u8BED/\u75C5\u53E5\uFF09','\u8BED\u6587\uFF1A\u6574\u7406\u6691\u671F\u4F5C\u6587\u96C6\uFF08\u81F3\u5C113\u7BC7\uFF09+\u88C5\u8BA2\u6210\u518C'][idx],'chinese','chn'));

function fmt(d){return (d.getMonth()+1)+'.'+d.getDate()}
function dn(d){return '\u5468'+['\u65E5','\u4E00','\u4E8C','\u4E09','\u56DB','\u4E94','\u516D'][d.getDay()]}
function td(di,tid){return checkState[di+'_'+tid]===true}
function isLocked(di){return checkState[di+'_locked']===true}
function dayDone(di){var ts=getDayTasks(di);return ts.length>0&&ts.every(function(t){return td(di,t.id)})}

function setSync(s){var d=document.getElementById('syncDot'),t=document.getElementById('syncText');d.className='sync-dot '+s;if(s==='online'){t.textContent='\u5DF2\u540C\u6B65 \u00B7 \u591A\u8BBE\u5907\u6570\u636E\u4E92\u901A';syncOk=1}else if(s==='syncing')t.textContent='\u540C\u6B65\u4E2D\u2026';else{t.textContent='\u79BB\u7EBF\u6A21\u5F0F \u00B7 \u6570\u636E\u6682\u5B58\u672C\u5730';syncOk=0}}
function loadState(){try{var s=localStorage.getItem(LS_KEY);if(s){checkState=JSON.parse(s);renderAll()}}catch(e){}fetch(API+'&select=state,version',{headers:HEADERS}).then(function(r){if(!r.ok)throw Error(r.status);return r.json()}).then(function(d){if(d&&d.length>0){checkState=d[0].state||{};syncVersion=d[0].version||0;localStorage.setItem(LS_KEY,JSON.stringify(checkState))}setSync('online');renderAll()}).catch(function(){setSync('offline');renderAll()})}
function saveState(){localStorage.setItem(LS_KEY,JSON.stringify(checkState));syncVersion++;var body=JSON.stringify({state:checkState,version:syncVersion,updated_at:new Date().toISOString()});fetch(API,{method:'PATCH',headers:HEADERS,body:body}).then(function(r){if(r.status===404||r.status===204){return fetch(SUPABASE_URL+'/rest/v1/checkin',{method:'POST',headers:HEADERS,body:JSON.stringify({id:'singleton',state:checkState,version:syncVersion,updated_at:new Date().toISOString()})}).then(function(r2){if(!r2.ok&&r2.status!==201)throw Error(r2.status)})}if(!r.ok)throw Error(r.status);setSync('online')}).catch(function(){syncVersion--;setSync('offline')})}
function pollSync(){fetch(API+'&select=state,version',{headers:HEADERS}).then(function(r){if(!r.ok){setSync('offline');return}r.json().then(function(d){if(d&&d.length>0&&d[0].version>syncVersion){checkState=d[0].state||{};syncVersion=d[0].version;localStorage.setItem(LS_KEY,JSON.stringify(checkState));renderAll()}setSync('online')})}).catch(function(){setSync('offline')})}

function toggleTask(di,tid){if(dayDone(di))return;checkState[di+'_'+tid]=!checkState[di+'_'+tid];saveState();renderAll()}
function closeDay(di){document.querySelector('.day-card[data-day="'+di+'"]').classList.remove('open');saveState()}

var activePhase=null;
function renderPhaseTabs(){document.getElementById('phaseTabs').innerHTML=phases.map(function(p){var total=0,done=0;for(var i=p.start;i<=p.end;i++){var ts=getDayTasks(i);total+=ts.length;done+=ts.filter(function(t){return td(i,t.id)}).length}var pct=total>0?Math.round(done/total*100):0;return '<div class="phase-tab'+(activePhase===p.id||(!activePhase&&p.id==='p1')?' active':'')+'" data-phase="'+p.id+'" onclick="switchPhase(\''+p.id+'\')"><span class="dot" style="background:'+p.color+'"></span>'+p.name+' '+p.range+' '+pct+'%</div>'}).join('')}
function renderStats(){var subs={math:{e:'\uD83D\uDCD0',n:'\u6570\u5B66',c:'#0071e3'},physics:{e:'\u26A1',n:'\u7269\u7406',c:'#ff9500'},history:{e:'\uD83D\uDCDC',n:'\u5386\u53F2',c:'#ff3b30'},politics:{e:'\u2696\uFE0F',n:'\u9053\u6CD5',c:'#af52de'},english:{e:'\uD83D\uDD24',n:'\u82F1\u8BED',c:'#34c759'},chinese:{e:'\uD83D\uDCD6',n:'\u8BED\u6587',c:'#5ac8fa'},reading:{e:'\uD83D\uDCDA',n:'\u540D\u8457',c:'#8e8e93'},review:{e:'\uD83D\uDCDD',n:'\u590D\u4E60',c:'#6c757d'},tutor:{e:'\uD83E\uDDD1\u200D\uD83C\uDFEB',n:'\u8F85\u5BFC',c:'#ff6b35'}};var counts={};for(var i=0;i<totalDays;i++)getDayTasks(i).forEach(function(t){if(!counts[t.subj])counts[t.subj]={total:0,done:0};counts[t.subj].total++;if(td(i,t.id))counts[t.subj].done++});document.getElementById('statsRow').innerHTML=Object.keys(subs).map(function(k){var s=subs[k],c=counts[k]||{total:0,done:0},p=c.total>0?Math.round(c.done/c.total*100):0;return'<div class="stat-card" style="border-color:'+s.c+'20"><div class="emoji">'+s.e+'</div><div class="num" style="color:'+s.c+'">'+p+'%</div><div class="label">'+s.n+'</div></div>'}).join('')}

function renderDays(filter){
  var pm={};phases.forEach(function(p){for(var i=p.start;i<=p.end;i++)pm[i]=p});
  var h='',cw=-1;
  for(var i=0;i<totalDays;i++){
    var p=pm[i];if(!p||(filter&&p.id!==filter))continue;
    var locked=dayDone(i);
    var d=new Date(startDate);d.setDate(d.getDate()+i);
    var wk=Math.floor(i/7);
    if(wk!==cw){cw=wk;var we=new Date(d);we.setDate(we.getDate()+(6-d.getDay()));if(we>endDate)we.setTime(endDate.getTime());h+='<div class="week-label">\uD83D\uDCC5 \u7B2C'+(wk+1)+'\u5468 \u00B7 '+fmt(d)+' \u2014 '+fmt(we)+'</div>'}
    var ts=getDayTasks(i),dc=ts.filter(function(t){return td(i,t.id)}).length;
    h+='<div class="day-card'+(locked?' locked':'')+'" data-day="'+i+'"><div class="day-header" onclick="this.parentElement.classList.toggle(\'open\')"><div class="day-dot'+(locked||dayDone(i)?' checked':'')+'"></div><div class="day-date">'+fmt(d)+' '+dn(d)+'</div><div class="day-phase-tag" style="background:'+p.color+'20;color:'+p.color+'">'+p.name.replace(/[^\u4e00-\u9fa5]/g,'').slice(0,5)+'</div><div class="day-check-count">'+dc+'/'+ts.length+'</div>';
    if(locked){h+='<span class="checkin-btn locked">\u2705\u5DF2\u6253\u5361</span>'}
    else{h+='<button class="checkin-btn" onclick="event.stopPropagation();openDay('+i+')">\u6253\u5361</button>'}
    h+='<div class="day-arrow">\u25BC</div></div>';
    h+='<div class="task-list">';
    h+=ts.map(function(t){var dd=td(i,t.id);return'<div class="task-item" onclick="event.stopPropagation();toggleTask('+i+',\''+t.id+'\')"><div class="task-check'+(dd?' done':'')+'"></div><div class="task-body"><div class="task-name">'+t.name+'</div></div><div class="task-subject s-'+t.subj+'">'+{math:'\u6570\u5B66',physics:'\u7269\u7406',history:'\u5386\u53F2',politics:'\u9053\u6CD5',english:'\u82F1\u8BED',chinese:'\u8BED\u6587',reading:'\u540D\u8457',review:'\u590D\u4E60',tutor:'\u8F85\u5BFC'}[t.subj]+'</div></div>'}).join('');
    if(!locked){h+='<div class="finish-btn-wrap"><button class="finish-btn" onclick="event.stopPropagation();closeDay('+i+')">\u2705 \u5B8C\u6210\u6253\u5361</button></div>'}
    h+='</div></div>';
  }
  document.getElementById('daysContainer').innerHTML=h;
}

function openDay(di){document.querySelector('.day-card[data-day="'+di+'"]').classList.add('open')}
function renderProgress(){var total=0,done=0;for(var i=0;i<totalDays;i++){var ts=getDayTasks(i);total+=ts.length;done+=ts.filter(function(t){return td(i,t.id)}).length}var raw=total>0?done/total*100:0,pct=raw<1&&raw>0?raw.toFixed(1):Math.round(raw);document.getElementById('progressPercent').textContent=pct+'%';document.getElementById('progressFill').style.width=raw+'%'}
function renderAll(){renderPhaseTabs();renderStats();renderDays(activePhase);renderProgress()}
function switchPhase(id){activePhase=id;renderAll();document.getElementById('daysContainer').scrollIntoView({behavior:'smooth'})}
function expandAll(){document.querySelectorAll('.day-card').forEach(function(c){c.classList.add('open')});showToast('\u5DF2\u5168\u90E8\u5C55\u5F00 \u2705')}
function collapseAll(){document.querySelectorAll('.day-card').forEach(function(c){c.classList.remove('open')});showToast('\u5DF2\u5168\u90E8\u6536\u8D77 \uD83D\uDCE6')}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},1500)}

renderAll();setSync('syncing');loadState();setInterval(pollSync,10000);
</script>
