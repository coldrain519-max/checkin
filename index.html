.sync-bar{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:10px;font-size:11px;opacity:.85}

.sync-dot.online{background:#34c759;box-shadow:0 0 6px #34c75980}
.sync-dot.offline{background:#ff3b30;box-shadow:0 0 6px #ff3b3080}
.sync-dot.syncing{background:#ff9500;animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.progress-wrap{padding:14px 20px;background:var(--card);border-bottom:1px solid var(--border)}
.progress-label{display:flex;justify-content:space-between;font-size:13px;font-weight:600;margin-bottom:6px}

.phase-tabs::-webkit-scrollbar{display:none}

.phase-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.phase-tab .dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px;vertical-align:middle}
.stats-row{display:flex;gap:8px;padding:10px 16px;overflow-x:auto;background:var(--card);scrollbar-width:none}
.stats-row::-webkit-scrollbar{display:none}
.stat-card{flex-shrink:0;padding:8px 14px;border-radius:10px;background:#f9f9fb;text-align:center;min-width:64px;border:1.5px solid transparent}
.stat-card .emoji{font-size:16px}
.stat-card .num{font-size:18px;font-weight:700;margin-top:1px}
.stat-card .label{font-size:10px;color:var(--sub)}
.days-container{padding:10px 16px 80px}
.week-label{font-size:12px;font-weight:700;color:var(--sub);letter-spacing:1px;padding:10px 4px 6px;margin-top:4px}
.day-card{background:var(--card);border-radius:12px;margin-bottom:6px;overflow:hidden;border:1px solid var(--border);transition:all .2s}
.day-card.done{background:#f1f8e9;border-color:#c8e6c9}
.day-header{display:flex;align-items:center;padding:10px 12px;cursor:pointer;user-select:none}
.day-dot{width:10px;height:10px;border-radius:50%;margin-right:8px;flex-shrink:0;border:2px solid var(--border)}
.day-dot.checked{background:var(--green);border-color:var(--green)}
.day-date{font-size:13px;font-weight:600;flex:1}
.day-phase-tag{font-size:10px;padding:2px 7px;border-radius:8px;font-weight:600;margin-right:4px}
.day-check-count{font-size:11px;color:var(--sub);margin-right:4px}
.day-arrow{font-size:11px;color:var(--sub);transition:transform .2s}
.day-card.open .day-arrow{transform:rotate(180deg)}
.task-list{display:none;padding:0 12px 10px}
.day-card.open .task-list{display:block}
.task-item{display:flex;align-items:flex-start;padding:7px 8px;margin-bottom:3px;border-radius:8px;background:#f9f9fb;cursor:pointer;transition:background .15s}
.task-item:active{background:#eee}
.task-check{width:20px;height:20px;border-radius:50%;border:2px solid #d1d1d6;margin-right:8px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.task-check.done{background:var(--green);border-color:var(--green)}
.task-check.done::after{content:'\2713';color:#fff;font-size:11px;font-weight:700}
.task-body{flex:1;min-width:0}
.task-name{font-size:12.5px;font-weight:500;line-height:1.4;word-break:break-word}
.task-subject{font-size:10px;padding:1px 6px;border-radius:6px;font-weight:600;color:#fff;flex-shrink:0}

.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);padding:10px 16px;display:flex;gap:10px;z-index:10}
.btn{flex:1;padding:10px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;text-align:center;border:none;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-outline{background:#fff;border:1.5px solid var(--border);color:var(--text)}
.btn:active{transform:scale(.97);opacity:.85}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#1d1d1f;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:100;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
@media(max-width:380px){.header h1{font-size:18px}.task-name{font-size:11.5px}}
</style>
</head>

function fmt(d){return (d.getMonth()+1)+'.'+d.getDate()}
function dayName(d){return '\u5468'+['\u65E5','\u4E00','\u4E8C','\u4E09','\u56DB','\u4E94','\u516D'][d.getDay()]}
function done(di,tid){return checkState[di+'_'+tid]===true}
function dayDone(di){var ts=getDayTasks(di);return ts.length>0&&ts.every(function(t){return done(di,t.id)})}

// ===== SYNC =====
function setSync(s){
  var d=document.getElementById('syncDot'),t=document.getElementById('syncText');
  d.className='sync-dot '+s;
  if(s==='online'){t.textContent='\u5DF2\u540C\u6B65 \u00B7 \u591A\u8BBE\u5907\u6570\u636E\u4E92\u901A';syncOk=true}
  else if(s==='syncing')t.textContent='\u540C\u6B65\u4E2D\u2026';
  else{t.textContent='\u79BB\u7EBF\u6A21\u5F0F \u00B7 \u6570\u636E\u6682\u5B58\u672C\u5730';syncOk=false}
}

function loadState(){
  try{var s=localStorage.getItem(LS_KEY);if(s){checkState=JSON.parse(s);renderAll()}}catch(e){}
  fetch(API+'&select=state,version',{headers:HEADERS})
    .then(function(r){if(!r.ok)throw Error(r.status);return r.json()})
    .then(function(d){
      if(d&&d.length>0){checkState=d[0].state||{};syncVersion=d[0].version||0;localStorage.setItem(LS_KEY,JSON.stringify(checkState))}
      setSync('online');renderAll();
    })
    .catch(function(){setSync('offline');renderAll()});
}

function saveState(){
  localStorage.setItem(LS_KEY,JSON.stringify(checkState));
  syncVersion++;
  var body=JSON.stringify({state:checkState,version:syncVersion,updated_at:new Date().toISOString()});
  fetch(API,{method:'PATCH',headers:HEADERS,body:body})
    .then(function(r){
      if(r.status===404||r.status===204){
        return fetch(SUPABASE_URL+'/rest/v1/checkin',{
          method:'POST',headers:HEADERS,
          body:JSON.stringify({id:'singleton',state:checkState,version:syncVersion,updated_at:new Date().toISOString()})
        }).then(function(r2){if(!r2.ok&&r2.status!==201)throw Error(r2.status)});
      }
      if(!r.ok)throw Error(r.status);
      setSync('online');
    })
    .catch(function(){syncVersion--;setSync('offline')});
}

function pollSync(){
  fetch(API+'&select=state,version',{headers:HEADERS})
    .then(function(r){if(!r.ok){setSync('offline');return}r.json().then(function(d){
      if(d&&d.length>0&&d[0].version>syncVersion){checkState=d[0].state||{};syncVersion=d[0].version;localStorage.setItem(LS_KEY,JSON.stringify(checkState));renderAll()}
      setSync('online');
    })})
    .catch(function(){setSync('offline')});
}

function toggleTask(di,tid){
  setSync('syncing');
  checkState[di+'_'+tid]=!checkState[di+'_'+tid];
  saveState();
  renderAll();
}

// ===== RENDER =====
var activePhase=null;

function renderPhaseTabs(){
  document.getElementById('phaseTabs').innerHTML=phases.map(function(p){
    var total=0,done=0;
    for(var i=p.start;i<=p.end;i++){var ts=getDayTasks(i);total+=ts.length;done+=ts.filter(function(t){return window.done(i,t.id)}).length}
    var pct=total>0?Math.round(done/total*100):0;
    return '<div class="phase-tab'+(activePhase===p.id||(!activePhase&&p.id==='p1')?' active':'')+'" data-phase="'+p.id+'" onclick="switchPhase(\''+p.id+'\')"><span class="dot" style="background:'+p.color+'"></span>'+p.name+' '+p.range+' '+pct+'%</div>';
  }).join('');
}

  var subs={math:{e:'\uD83D\uDCD0',n:'\u6570\u5B66',c:'#0071e3'},physics:{e:'\u26A1',n:'\u7269\u7406',c:'#ff9500'},history:{e:'\uD83D\uDCDC',n:'\u5386\u53F2',c:'#ff3b30'},politics:{e:'\u2696\uFE0F',n:'\u9053\u6CD5',c:'#af52de'},english:{e:'\uD83D\uDD24',n:'\u82F1\u8BED',c:'#34c759'},chinese:{e:'\uD83D\uDCD6',n:'\u8BED\u6587',c:'#5ac8fa'},reading:{e:'\uD83D\uDCDA',n:'\u540D\u8457',c:'#8e8e93'},review:{e:'\uD83D\uDCDD',n:'\u590D\u4E60',c:'#6c757d'},tutor:{e:'\uD83E\uDDD1\u200D\uD83C\uDFEB',n:'\u8F85\u5BFC',c:'#ff6b35'}};
  var counts={};
  for(var i=0;i<totalDays;i++)getDayTasks(i).forEach(function(t){if(!counts[t.subj])counts[t.subj]={total:0,done:0};counts[t.subj].total++;if(window.done(i,t.id))counts[t.subj].done++});
  document.getElementById('statsRow').innerHTML=Object.keys(subs).map(function(k){var s=subs[k],c=counts[k]||{total:0,done:0},p=c.total>0?Math.round(c.done/c.total*100):0;return'<div class="stat-card" style="border-color:'+s.c+'20"><div class="emoji">'+s.e+'</div><div class="num" style="color:'+s.c+'">'+p+'%</div><div class="label">'+s.n+'</div></div>'}).join('');
}

function renderDays(filter){
  var pm={};phases.forEach(function(p){for(var i=p.start;i<=p.end;i++)pm[i]=p});
  var h='',cw=-1;
  for(var i=0;i<totalDays;i++){
    var p=pm[i];if(!p||(filter&&p.id!==filter))continue;
    var d=new Date(startDate);d.setDate(d.getDate()+i);
    var wk=Math.floor(i/7);
    if(wk!==cw){cw=wk;var we=new Date(d);we.setDate(we.getDate()+(6-d.getDay()));if(we>endDate)we.setTime(endDate.getTime());h+='<div class="week-label">\uD83D\uDCC5 \u7B2C'+(wk+1)+'\u5468 \u00B7 '+fmt(d)+' \u2014 '+fmt(we)+'</div>'}
    var ts=getDayTasks(i),dc=ts.filter(function(t){return window.done(i,t.id)}).length;
    var open=i===(filter?phases.find(function(ph){return ph.id===filter}).start:-1);
    h+='<div class="day-card'+(dayDone(i)?' done':'')+(open?' open':'')+'" data-day="'+i+'"><div class="day-header" onclick="this.parentElement.classList.toggle(\'open\')"><div class="day-dot'+(dayDone(i)?' checked':'')+'"></div><div class="day-date">'+fmt(d)+' '+dayName(d)+'</div><div class="day-phase-tag" style="background:'+p.color+'20;color:'+p.color+'">'+p.name.replace(/[^\u4e00-\u9fa5]/g,'').slice(0,5)+'</div><div class="day-check-count">'+dc+'/'+ts.length+'</div><div class="day-arrow">\u25BC</div></div><div class="task-list">'+ts.map(function(t){var dd=window.done(i,t.id);return'<div class="task-item" onclick="event.stopPropagation();toggleTask('+i+',\''+t.id+'\')"><div class="task-check'+(dd?' done':'')+'"></div><div class="task-body"><div class="task-name">'+t.name+'</div></div><div class="task-subject s-'+t.subj+'">'+{math:'\u6570\u5B66',physics:'\u7269\u7406',history:'\u5386\u53F2',politics:'\u9053\u6CD5',english:'\u82F1\u8BED',chinese:'\u8BED\u6587',reading:'\u540D\u8457',review:'\u590D\u4E60',tutor:'\u8F85\u5BFC'}[t.subj]+'</div></div>'}).join('')+'</div></div>';
  }
  document.getElementById('daysContainer').innerHTML=h;
}

function renderProgress(){
  var total=0,done=0;
  for(var i=0;i<totalDays;i++){var ts=getDayTasks(i);total+=ts.length;done+=ts.filter(function(t){return window.done(i,t.id)}).length}
  var raw=total>0?done/total*100:0,pct=raw<1&&raw>0?raw.toFixed(1):Math.round(raw);
  document.getElementById('progressPercent').textContent=pct+'%';
  document.getElementById('progressFill').style.width=raw+'%';
}

function renderAll(){renderPhaseTabs();renderStats();renderDays(activePhase);renderProgress()}
function switchPhase(id){activePhase=id;renderAll();document.getElementById('daysContainer').scrollIntoView({behavior:'smooth'})}
function expandAll(){document.querySelectorAll('.day-card').forEach(function(c){c.classList.add('open')});showToast('\u5DF2\u5168\u90E8\u5C55\u5F00 \u2705')}
function collapseAll(){document.querySelectorAll('.day-card').forEach(function(c){c.classList.remove('open')});showToast('\u5DF2\u5168\u90E8\u6536\u8D77 \uD83D\uDCE6')}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},1500)}

// ===== INIT =====
renderAll(); // 立即渲染空页面，不等网络
setSync('syncing');
loadState();
setInterval(pollSync,10000);
</script>
</body>
